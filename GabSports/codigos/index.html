<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GabSports</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
       <img src="../imagens/logo.png">
    </header>

    <main class="container">
        <section class="produtos-area">
            <h2>Produtos</h2>

            <div class="filtros">
                <select id="filtroPreco">
                    <option value="todos">Todos</option>
                    <option value="ate50">Até R$50</option>
                    <option value="acima50">Acima de R$50</option>
                </select>

                <select id="filtroEsporte">
                    <option value="todos">Todos</option>
                    <option value="futebol">Futebol/Futsal</option>
                    <option value="volei">Vôlei</option>
                    <option value="basquete">Basquete</option>
                    <option value="tenisMesas">Tênis de mesa</option>
                    <option value="tenis">Tênis</option>
                </select>
            </div>

            <div id="listaProdutos" class="produtos-grid">
                <!-- Os produtos serão inseridos aqui pelo JavaScript -->
            </div>
        </section>

        <section class="carrinho-area">
            <h2>Carrinho</h2>
            <div id="carrinhoVazio">Carrinho vazio</div>
            <div id="itensCarrinho"></div>
            <div class="total-area">
                <span>Total: </span>
                <span id="valorTotal">R$ 0,00</span>
            </div>
            <button id="limparCarrinho">Limpar carrinho</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
